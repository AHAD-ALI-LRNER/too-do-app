<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus — Todo App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #ede8dc;
      --border: #d4ccbc;
      --ink: #1a1814;
      --ink-muted: #7a7060;
      --accent: #c0392b;
      --accent-light: #e8d5d3;
      --done-color: #8a8070;
      --shadow: 0 2px 16px rgba(30,24,10,0.10);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8bfaa' fill-opacity='0.18'%3E%3Cpath d='M0 38.59l2.83-2.83 1.41 1.41L1.41 40H0v-1.41zM0 20.83l2.83-2.83 1.41 1.41-2.83 2.83L0 20.83zm0-17.66l2.83-2.83 1.41 1.41L1.41 4H0V2.17zM17.66 40l2.83-2.83 1.41 1.41L19.07 40h-1.41zm0-17.66l2.83-2.83 1.41 1.41-2.83 2.83-1.41-1.41zm0-17.66l2.83-2.83 1.41 1.41L19.07 4h-1.41V2.17zM35.32 40l2.83-2.83 1.41 1.41L37.07 40h-2.41v.59zm0-17.66l2.83-2.83 1.41 1.41-2.83 2.83-1.41-1.41zm0-17.66l2.83-2.83 1.41 1.41L37.07 4h-2.41V1.41z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    header {
      width: 100%;
      max-width: 560px;
      margin-bottom: 36px;
      animation: fadeDown 0.5s ease both;
    }

    .header-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .stats {
      margin-top: 10px;
      font-size: 12px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .input-row {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      animation: fadeDown 0.5s 0.08s ease both;
    }

    .task-input {
      flex: 1;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 13px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }

    .task-input::placeholder { color: var(--ink-muted); }
    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light), var(--shadow);
    }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 13px 22px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.18s, transform 0.1s;
      box-shadow: var(--shadow);
      white-space: nowrap;
    }
    .add-btn:hover { background: #a93226; }
    .add-btn:active { transform: scale(0.97); }

    .filters {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      animation: fadeDown 0.5s 0.14s ease both;
    }

    .filter-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 5px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--ink-muted);
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--bg);
    }

    .task-list {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeDown 0.5s 0.2s ease both;
    }

    .task-item {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: slideIn 0.25s ease both;
    }

    .task-item:hover { box-shadow: 0 4px 24px rgba(30,24,10,0.13); }
    .task-item.done { opacity: 0.55; }
    .task-item.removing { opacity: 0; transform: translateX(20px); }

    .checkbox {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      background: transparent;
    }
    .checkbox:hover { border-color: var(--accent); }
    .task-item.done .checkbox {
      background: var(--done-color);
      border-color: var(--done-color);
    }
    .checkmark {
      display: none;
      color: #fff;
      font-size: 12px;
    }
    .task-item.done .checkmark { display: block; }

    .task-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      cursor: pointer;
      transition: color 0.15s;
    }
    .task-item.done .task-text {
      color: var(--done-color);
      text-decoration: line-through;
    }

    .task-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--surface);
      color: var(--ink-muted);
      border: 1px solid var(--border);
      letter-spacing: 0.04em;
      cursor: pointer;
      flex-shrink: 0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 16px;
      padding: 2px 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 48px 0 24px;
      color: var(--ink-muted);
      font-size: 13px;
      line-height: 2;
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-state .big { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--border); display: block; margin-bottom: 8px; }

    .clear-row {
      width: 100%;
      max-width: 560px;
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }
    .clear-btn {
      background: none;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--ink-muted);
      cursor: pointer;
      letter-spacing: 0.04em;
      padding: 4px 0;
      border-bottom: 1px dashed var(--border);
      transition: color 0.15s, border-color 0.15s;
    }
    .clear-btn:hover { color: var(--accent); border-color: var(--accent); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-label">productivity</div>
  <h1>Stay <em>focused.</em></h1>
  <div class="stats" id="stats">0 tasks</div>
</header>

<div class="input-row">
  <input class="task-input" id="taskInput" type="text" placeholder="Add a new task…" autocomplete="off" />
  <button class="add-btn" id="addBtn">+ Add</button>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="done">Done</button>
</div>

<div class="task-list" id="taskList"></div>

<div class="empty-state" id="emptyState">
  <span class="big">✦</span>
  Nothing here yet.<br/>Add a task above to get started.
</div>

<div class="clear-row">
  <button class="clear-btn" id="clearDone">Clear completed</button>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('focus_tasks') || '[]');
  let filter = 'all';

  const taskInput = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const taskList = document.getElementById('taskList');
  const emptyState = document.getElementById('emptyState');
  const statsEl = document.getElementById('stats');
  const clearDoneBtn = document.getElementById('clearDone');

  function save() {
    localStorage.setItem('focus_tasks', JSON.stringify(tasks));
  }

  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const active = total - done;
    statsEl.textContent = total === 0
      ? '0 tasks'
      : `${active} remaining · ${done} done`;
  }

  function getFiltered() {
    if (filter === 'active') return tasks.filter(t => !t.done);
    if (filter === 'done') return tasks.filter(t => t.done);
    return tasks;
  }

  function render() {
    taskList.innerHTML = '';
    const filtered = getFiltered();

    filtered.forEach(task => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' done' : '');
      item.dataset.id = task.id;

      item.innerHTML = `
        <div class="checkbox" title="Toggle done">
          <span class="checkmark">✓</span>
        </div>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <button class="delete-btn" title="Delete">✕</button>
      `;

      item.querySelector('.checkbox').addEventListener('click', () => toggleDone(task.id));
      item.querySelector('.task-text').addEventListener('click', () => toggleDone(task.id));
      item.querySelector('.delete-btn').addEventListener('click', () => deleteTask(task.id, item));

      taskList.appendChild(item);
    });

    emptyState.className = 'empty-state' + (filtered.length === 0 ? ' visible' : '');
    updateStats();
  }

  function addTask() {
    const text = taskInput.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, done: false });
    taskInput.value = '';
    save();
    render();
  }

  function toggleDone(id) {
    const task = tasks.find(t => t.id === id);
    if (task) { task.done = !task.done; save(); render(); }
  }

  function deleteTask(id, el) {
    el.classList.add('removing');
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }, 200);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  clearDoneBtn.addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  });

  render();
</script>
</body>
</html>
